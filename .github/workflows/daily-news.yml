name: Daily Market News Update

on:
  schedule:
    # Runs at 03:00 UTC (08:30 IST) every day
    - cron: '0 3 * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install rss-parser

      - name: Fetch latest news
        run: node scripts/fetch-news.mjs

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add lib/daily-news.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "auto: daily market news update [skip ci]" && git push)
