<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="FreshCart — Your premium online grocery store. Browse fresh produce, dairy, bakery and more. Fast delivery to your doorstep.">
  <title>FreshCart — Fresh Groceries Delivered</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="#/" class="nav-logo" id="nav-logo">
        <span class="logo-icon">🛒</span>
        <span class="logo-text">Fresh<span class="logo-accent">Cart</span></span>
      </a>
      <div class="nav-search" id="nav-search">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
        </svg>
        <input type="text" id="search-input" placeholder="Search for groceries..." autocomplete="off">
      </div>
      <div class="nav-actions">
        <a href="#/orders" class="nav-link" id="nav-orders">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
          </svg>
          <span>Orders</span>
        </a>
        <a href="#/cart" class="nav-cart" id="nav-cart">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
            <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
            <path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/>
          </svg>
          <span class="cart-badge" id="cart-badge">0</span>
        </a>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main-content" id="app">
    <!-- Pages render here -->
  </main>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Scripts -->
  <script src="/js/api.js"></script>
  <script src="/js/components.js"></script>
  <script src="/js/pages/home.js"></script>
  <script src="/js/pages/cart.js"></script>
  <script src="/js/pages/checkout.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
